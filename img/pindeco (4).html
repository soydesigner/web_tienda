  :root{
    --navy-0:#0d1730;
    --navy-1:#16223f;
    --navy-2:#1f3056;
    --gold-dk:#9c7c41;
    --gold:#c9a85f;
    --gold-lt:#f0e2b6;
    --champ:#ece0bf;
    --ink:#d9dde8;
    --ink-soft:#9aa3b8;
    --red:#e23b2e;
    --orange:#f08a1d;
    --yellow:#f4c81e;
    --green:#7cc242;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Jost',sans-serif;
    background:radial-gradient(120% 90% at 50% 8%, var(--navy-2) 0%, var(--navy-1) 42%, var(--navy-0) 100%);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ambient paint splashes echoing the van */
  .splash{position:fixed;border-radius:50%;filter:blur(60px);opacity:.20;pointer-events:none;z-index:0}
  .s1{width:38vmax;height:38vmax;top:-12vmax;right:-10vmax;
      background:radial-gradient(circle at 35% 35%, var(--red), transparent 62%),
                 radial-gradient(circle at 70% 60%, var(--orange), transparent 60%);}
  .s2{width:34vmax;height:34vmax;bottom:-14vmax;left:-12vmax;
      background:radial-gradient(circle at 40% 40%, var(--green), transparent 60%),
                 radial-gradient(circle at 70% 65%, var(--yellow), transparent 58%);}

  .wrap{position:relative;z-index:1;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:clamp(28px,6vw,72px) 24px;}

  /* gold hairline ornament */
  .rule{display:flex;align-items:center;gap:14px;color:var(--gold);opacity:.9;margin:0 auto}
  .rule .line{width:clamp(40px,9vw,86px);height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
  .rule .line.r{background:linear-gradient(90deg,var(--gold),transparent)}
  .rule .dot{width:5px;height:5px;transform:rotate(45deg);background:var(--gold)}

  .logo{width:clamp(220px,32vw,360px);height:auto;
    filter:drop-shadow(0 18px 40px rgba(0,0,0,.55));
    animation:rise .9s cubic-bezier(.2,.7,.2,1) both;}

  .eyebrow{margin-top:26px;font-weight:500;letter-spacing:.42em;
    text-transform:uppercase;font-size:clamp(11px,1.4vw,14px);
    color:var(--gold-lt);padding-left:.42em;
    animation:fade 1s .25s both;}

  .tagline{
    font-family:'Pinyon Script',cursive;
    font-weight:400;line-height:.96;
    font-size:clamp(54px,11vw,138px);
    margin:10px auto 4px;
    max-width:14ch;
    background:linear-gradient(176deg,#fff6dd 4%,var(--gold-lt) 26%,var(--gold) 52%,var(--gold-dk) 74%,var(--gold-lt) 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    text-shadow:0 2px 1px rgba(0,0,0,.18);
    filter:drop-shadow(0 6px 14px rgba(0,0,0,.4));
    animation:rise 1s .35s both;
  }

  .sub{max-width:46ch;margin:18px auto 0;color:var(--ink-soft);
    font-weight:300;font-size:clamp(15px,1.8vw,18px);line-height:1.6;
    animation:fade 1.1s .55s both;}

  .cta{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;
    margin-top:38px;animation:fade 1.2s .7s both;}
  .btn{font-family:'Jost';font-weight:500;font-size:15px;letter-spacing:.04em;
    padding:15px 30px;border-radius:2px;cursor:pointer;text-decoration:none;
    transition:transform .25s ease,box-shadow .25s ease,background .25s ease,color .25s ease;
    border:1px solid transparent;}
  .btn:focus-visible{outline:2px solid var(--gold-lt);outline-offset:3px}
  .btn-primary{color:var(--navy-0);
    background:linear-gradient(170deg,var(--gold-lt),var(--gold) 55%,var(--gold-dk));
    box-shadow:0 10px 26px rgba(201,168,95,.28);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(201,168,95,.4)}
  .btn-ghost{color:var(--gold-lt);border-color:rgba(201,168,95,.55);background:transparent}
  .btn-ghost:hover{background:rgba(201,168,95,.1);transform:translateY(-2px)}

  /* contact strip */
  .foot{position:relative;z-index:1;border-top:1px solid rgba(201,168,95,.18);
    display:flex;gap:30px;flex-wrap:wrap;justify-content:center;align-items:center;
    padding:22px 24px;color:var(--ink-soft);font-weight:300;font-size:14px;letter-spacing:.03em}
  .foot b{color:var(--gold-lt);font-weight:500}
  .foot .seg{display:flex;align-items:center;gap:9px}
  .foot .pip{width:6px;height:6px;border-radius:50%;display:inline-block}

  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important}
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>
  <div class="splash s1" aria-hidden="true"></div>
